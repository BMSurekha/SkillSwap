# MySQL Profile Configuration

spring.datasource.url=jdbc:mysql://localhost:3306/skillswap?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=password

# JPA/Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable H2 Console for MySQL profile
spring.h2.console.enabled=false

# Auto initialization is handled by ddl-auto=update for MySQL. 
# Alternatively, manual schema.sql execution can be done.
spring.sql.init.mode=never
