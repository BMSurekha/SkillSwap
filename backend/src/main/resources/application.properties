# SkillSwap Configuration Properties

# Active Spring Profile (h2 or mysql)
spring.profiles.active=mysql

# Server Port
server.port=8080

# Multipart configurations (for file uploads)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT secret key (HMAC SHA-256 requires minimum 256 bits/32 bytes)
# Value is a base64 encoded secret: "skillswap_secret_key_for_jwt_auth_must_be_long_enough_256_bits" (hashed or padded)
skillswap.jwt.secret=c2tpbGxzd2FwX3NlY3JldF9rZXlfZm9yX2p3dF9hdXRoX211c3RfYmVfbG9uZ19lbm91Z2hfMjU2X2JpdHM=
# Token duration: 24 hours (86400000 ms)
skillswap.jwt.expiration=86400000
